<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Token 知识库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #0969da;
      --sidebar-width: 260px;
      --sidebar-background: #f6f8fa;
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .sidebar { border-right: 1px solid #d0d7de; }
    .sidebar-nav a { color: #24292f; font-size: 14px; }
    .sidebar-nav a:hover { color: #0969da; }
    .sidebar-nav .active { color: #0969da !important; font-weight: 600; }
    .markdown-section h1,
    .markdown-section h2 { border-bottom: 1px solid #d0d7de; padding-bottom: .4em; }
    .markdown-section table { border-collapse: collapse; width: 100%; display: table; }
    .markdown-section table th { background: #f6f8fa; font-weight: 600; }
    .markdown-section table td,
    .markdown-section table th { border: 1px solid #d0d7de; padding: 8px 16px; }
    .markdown-section table tr:hover td { background: #f6f8fa; }
    .app-name { font-weight: 700; font-size: 18px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI Token 知识库',
      repo: 'https://github.com/edge1024/aitoken',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '搜索...',
        noData: '没有找到结果',
        depth: 3
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
